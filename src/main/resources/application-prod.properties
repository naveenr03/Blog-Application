# Loaded when spring.profiles.active=prod (set on the host). DevUserSeedRunner is not active.
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN

# Existing Supabase/Postgres DBs already have tables; Flyway must baseline then run V1.
# Default baseline-version=1 would SKIP migration V1__ (same version) — owner_id never gets added.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
logging.level.org.flywaydb=INFO
