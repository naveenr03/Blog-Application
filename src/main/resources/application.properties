spring.application.name=blog
# Active dev profile seeds a default user (see DevUserSeedRunner). Override in production, e.g. spring.profiles.active=prod
spring.profiles.active=dev
# HS256: use a random secret at least 32 bytes (256 bits). Override via environment in production.
jwt.secret=your-256-bit-secret-key-here-make-it-at-least-32-bytes-long
# JWT lifetime in milliseconds (default 28800000 = 8 hours)
jwt.expiration-ms=28800000

dev.seed-user.email=user@test.com
dev.seed-user.name=Test User
dev.seed-user.password=${DEV_SEED_USER_PASSWORD:password}

# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/blog
spring.datasource.username=postgres
spring.datasource.password=Halamadrid15
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
