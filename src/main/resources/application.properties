spring.application.name=blog
# Active dev profile seeds a default user (see DevUserSeedRunner). Override in production, e.g. spring.profiles.active=prod
spring.profiles.active=dev
# Comma-separated browser origins allowed to call the API (needed when the SPA is on another host). Override with APP_CORS_ALLOWED_ORIGINS in production.
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-here-make-it-at-least-32-bytes-long}
# JWT lifetime in milliseconds (default 28800000 = 8 hours)
jwt.expiration-ms=28800000

dev.seed-user.email=user@test.com
dev.seed-user.name=Test User
dev.seed-user.password=${DEV_SEED_USER_PASSWORD:password}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/blog}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway runs before Hibernate; V1 adds owner_id on existing PostgreSQL DBs (prod upgrades)
spring.flyway.enabled=true

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
