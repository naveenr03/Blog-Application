services:
  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    restart: always
    environment:
      # Override via root ".env" (see .env.example); Compose loads .env for interpolation automatically.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: blog
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata

  adminer:
    image: adminer:latest
    ports:
      - "8888:8080"
    restart: always
